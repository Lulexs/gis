server:
  bind:
    host: 0.0.0.0
    port: 5000
  url: http://localhost:5000
  mimetype: application/json; charset=UTF-8
  encoding: utf-8
  gzip: false
  languages:
    # First language is the default language
    - en-US
    - fr-CA
  cors: true
  pretty_print: true
  limits:
    default_items: 20
    max_items: 50
  # templates:
  # path: /path/to/Jinja2/templates
  # static: /path/to/static/folder # css/js/img
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap contributors</a>'
  #    manager:
  #        name: TinyDB
  #        connection: /tmp/pygeoapi-process-manager.db
  #        output_dir: /tmp/
  # ogc_schemas_location: /opt/schemas.opengis.net
  admin: false # enable admin api

logging:
  level: DEBUG
  #logfile: /tmp/pygeoapi.log

metadata:
  identification:
    title:
      en: pygeoapi default instance
      fr: instance par défaut de pygeoapi
    description:
      en: pygeoapi provides an API to geospatial data
      fr: pygeoapi fournit une API aux données géospatiales
    keywords:
      en:
        - geospatial
        - data
        - api
      fr:
        - géospatiale
        - données
        - api
    keywords_type: theme
    terms_of_service: https://creativecommons.org/licenses/by/4.0/
    url: https://example.org
  license:
    name: CC-BY 4.0 license
    url: https://creativecommons.org/licenses/by/4.0/
  provider:
    name: Organization Name
    url: https://pygeoapi.io
  contact:
    name: Lastname, Firstname
    position: Position Title
    address: Mailing Address
    city: City
    stateorprovince: Administrative Area
    postalcode: Zip or Postal Code
    country: Country
    phone: +xx-xxx-xxx-xxxx
    fax: +xx-xxx-xxx-xxxx
    email: you@example.org
    url: Contact URL
    hours: Mo-Fr 08:00-17:00
    instructions: During hours of service. Off on weekends.
    role: pointOfContact

resources:
  kanto_prefectures:
    type: collection
    title: Kanto Region Prefectures
    description: List of Kanto Region Prefectures in Japan
    keywords:
      - japan
      - kanto
      - prefectures
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: PostgreSQL
        data:
          host: localhost
          database: postgres
          user: postgres
          password: postgres
        table: kanto_prefectures
        id_field: id
        geom_field: geom

  tokyo_hot_springs:
    type: collection
    title: Tokyo Hot Springs
    description: List of hot springs in the area of Greater Tokyo
    keywords:
      - tokyo
      - hot springs
    extents:
      spatial:
        bbox: [-180, -90, 180, 90]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: PostgreSQL
        data:
          host: localhost
          database: postgres
          user: postgres
          password: postgres
        table: tokyo_hot_springs
        id_field: id
        geom_field: geom

  temples:
    type: collection
    title: Kanto Temples Hotspot
    description: Temples within the most densely populated administrative area
    extents:
      spatial:
        bbox: [138, 34, 141, 37]
        crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
    providers:
      - type: feature
        name: PostgreSQL
        data:
          host: localhost
          database: postgres
          user: postgres
          password: postgres
        table: temples
        id_field: id
        geom_field: geom
      - type: map
        name: MapScript
        data: C:\Users\Luka\Desktop\gis_ps\p2\pygeoapi\temples.map
        options:
          layer: temples_layer
