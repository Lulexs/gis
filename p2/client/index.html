<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanto Web GIS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="index.css">

</head>
<body>

<div id="ui-panel">

<h3>Kanto Control Panel</h3>

<h3>Feature Layers</h3>
<div id="feature-layers"></div>

<h3>Map Layers</h3>
<div id="map-layers"></div>

<hr>

<label for="tokyo-filter">Filter Tokyo Area:</label>

<select id="tokyo-filter">
<option value="all">Show All</option>
<option value="true">Part of Tokyo Only</option>
<option value="false">Outside Tokyo Only</option>
</select>

<button id="apply-filter">Execute CQL Query</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src='https://unpkg.com/leaflet-imageoverlay-ogcapi@0.1.0/Leaflet.ImageOverlay.OGCAPI.js'></script>
<script src="index.js"></script>

</body>
</html>
